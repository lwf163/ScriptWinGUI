syntax = "proto3";

import "google/protobuf/empty.proto";

package swg.input;

option csharp_namespace = "Swg.Grpc.Input";

message InputOkResponse {
  bool ok = 1;
}

message InputMouseGetPositionResponse {
  int32 x = 1;
  int32 y = 2;
}

message InputMouseMoveToRequest {
  int32 x = 1;
  int32 y = 2;
}

message InputMouseMoveByRequest {
  int32 delta_x = 1;
  int32 delta_y = 2;
}

message InputMouseClickRequest {
  bool has_x = 1;
  int32 x = 2;
  bool has_y = 3;
  int32 y = 4;
  string button = 5;
  int32 click_count = 6;
}

message InputMouseDownRequest {
  bool has_x = 1;
  int32 x = 2;
  bool has_y = 3;
  int32 y = 4;
  string button = 5;
  repeated string modifiers = 6;
}

message InputMouseUpRequest {
  string button = 1;
  repeated string modifiers = 2;
}

message InputMouseDragToRequest {
  int32 start_x = 1;
  int32 start_y = 2;
  int32 end_x = 3;
  int32 end_y = 4;
  string button = 5;
  repeated string modifiers = 6;
}

message InputMouseDragByDistanceRequest {
  int32 start_x = 1;
  int32 start_y = 2;
  int32 distance_x = 3;
  int32 distance_y = 4;
  string button = 5;
  repeated string modifiers = 6;
}

message InputMouseScrollRequest {
  int32 x = 1;
  int32 y = 2;
  int32 wheel_lines = 3;
}

message InputMouseHorizontalScrollRequest {
  int32 x = 1;
  int32 y = 2;
  int32 wheel_lines = 3;
}

message InputMouseMoveSettingsResponse {
  double move_pixels_per_millisecond = 1;
  double move_pixels_per_step = 2;
}

message InputMouseMoveSettingsRequest {
  bool has_move_pixels_per_millisecond = 1;
  double move_pixels_per_millisecond = 2;
  bool has_move_pixels_per_step = 3;
  double move_pixels_per_step = 4;
}

message InputKeyboardTypeTextRequest {
  string text = 1;
}

message InputKeyboardTypeCharRequest {
  string character = 1;
}

message InputKeyboardTypeKeysRequest {
  repeated string keys = 1;
}

message InputKeyboardTypeSimultaneouslyRequest {
  repeated string keys = 1;
}

message InputKeyboardTypeKeyRequest {
  string key = 1;
}

message InputKeyboardPressRequest {
  string key = 1;
}

message InputKeyboardReleaseRequest {
  string key = 1;
}

message InputKeyboardTypeSequenceRequest {
  string sequence = 1;
}

message InputWaitRequest {
  int32 milliseconds = 1;
}

service InputService {
  rpc TypeText(InputKeyboardTypeTextRequest) returns (InputOkResponse);
  rpc TypeChar(InputKeyboardTypeCharRequest) returns (InputOkResponse);
  rpc TypeKeys(InputKeyboardTypeKeysRequest) returns (InputOkResponse);
  rpc TypeSimultaneously(InputKeyboardTypeSimultaneouslyRequest) returns (InputOkResponse);
  rpc TypeKey(InputKeyboardTypeKeyRequest) returns (InputOkResponse);
  rpc Press(InputKeyboardPressRequest) returns (InputOkResponse);
  rpc Release(InputKeyboardReleaseRequest) returns (InputOkResponse);
  rpc TypeSequence(InputKeyboardTypeSequenceRequest) returns (InputOkResponse);
  rpc GetCursorPosition(google.protobuf.Empty) returns (InputMouseGetPositionResponse);
  rpc SetCursorPosition(InputMouseMoveToRequest) returns (InputOkResponse);
  rpc MoveTo(InputMouseMoveToRequest) returns (InputOkResponse);
  rpc MoveBy(InputMouseMoveByRequest) returns (InputOkResponse);
  rpc GetMoveSettings(google.protobuf.Empty) returns (InputMouseMoveSettingsResponse);
  rpc SetMoveSettings(InputMouseMoveSettingsRequest) returns (InputOkResponse);
  rpc Click(InputMouseClickRequest) returns (InputOkResponse);
  rpc Down(InputMouseDownRequest) returns (InputOkResponse);
  rpc Up(InputMouseUpRequest) returns (InputOkResponse);
  rpc DragTo(InputMouseDragToRequest) returns (InputOkResponse);
  rpc DragBy(InputMouseDragByDistanceRequest) returns (InputOkResponse);
  rpc Scroll(InputMouseScrollRequest) returns (InputOkResponse);
  rpc HorizontalScroll(InputMouseHorizontalScrollRequest) returns (InputOkResponse);
  rpc Wait(InputWaitRequest) returns (InputOkResponse);
}
